<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberBooks - Logowanie i Rejestracja</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0d0e12;
            --bg-card: rgba(22, 24, 33, 0.75);
            --accent-primary: #a252fa;
            --accent-gradient: linear-gradient(135deg, #646cff 0%, #f355da 100%);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --neon-glow: rgba(162, 82, 250, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(100, 108, 255, 0.1);
        }

        .auth-logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--text-main);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .input-group input {
            background: #161821;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.85rem 1.2rem;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        /* Opcje dodatkowe - Zapamiętaj mnie */
        .options-group {
            margin-bottom: 1.5rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            gap: 8px;
        }

        .checkbox-container input {
            accent-color: var(--accent-primary);
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            box-shadow: 0 0 20px rgba(243, 85, 218, 0.4);
            transform: translateY(-2px);
        }

        /* Przycisk logowania kodem */
        .btn-email-link {
            width: 100%;
            padding: 0.9rem;
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .btn-email-link:hover {
            border-color: var(--accent-primary);
            background: rgba(162, 82, 250, 0.05);
        }

        /* Komunikaty o błędach/powodzeniach */
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            line-height: 1.4;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">CyberBooks</div>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-login">Logowanie</button>
            <button class="tab-btn" id="tab-register">Rejestracja</button>
        </div>

        <div class="alert alert-error" id="auth-alert"></div>

        <div class="form-panel active" id="panel-login">
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Adres E-mail</label>
                    <input type="email" id="login-email" placeholder="twoj-email@example.com" required>
                </div>
                <div class="input-group" id="password-group">
                    <label for="login-password">Hasło</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>

                <div class="options-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me" checked>
                        Zapamiętaj mnie
                    </label>
                </div>

                <button type="submit" class="btn-submit" id="btn-login-submit">Zaloguj się</button>
                <button type="button" class="btn-email-link" id="btn-send-link">🚀 Wyślij kod logowania na e-mail</button>
            </form>
        </div>

        <div class="form-panel" id="panel-register">
            <form id="register-form">
                <div class="input-group">
                    <label for="register-email">Adres E-mail</label>
                    <input type="email" id="register-email" placeholder="twoj-email@example.com" required>
                </div>
                <div class="input-group">
                    <label for="register-password">Hasło</label>
                    <input type="password" id="register-password" placeholder="Min. 6 znaków" required>
                </div>
                <button type="submit" class="btn-submit">Utwórz konto</button>
            </form>
        </div>

        <a href="index.html" class="back-link">← Wróć do platformy</a>
    </div>

    <script type="module" src="logowanie.js"></script>
</body>
</html>
